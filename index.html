<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booty Creek Waterpark</title>


<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Fredoka', system-ui, Arial;
}

body{
    color:#0f172a;
    overflow-x:hidden;

    
    background:
        radial-gradient(circle at 20% 20%, rgba(0,200,255,0.35), transparent 45%),
        radial-gradient(circle at 80% 30%, rgba(0,255,200,0.25), transparent 55%),
        radial-gradient(circle at 50% 90%, rgba(0,120,255,0.18), transparent 60%),
        linear-gradient(135deg,#f7fdff,#ffffff,#effff7);

    background-size:240% 240%;
    animation:bg 14s ease infinite;
}

@keyframes bg{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}



header{
    position:fixed;
    top:0;
    width:100%;
    padding:16px 44px;
    display:flex;
    justify-content:space-between;
    align-items:center;

    background:linear-gradient(90deg,rgba(255,255,255,0.85),rgba(240,255,255,0.7));
    backdrop-filter:blur(18px);
    border-bottom:1px solid rgba(0,0,0,0.06);
    z-index:10;
}

.logo img{
    height:52px;
    border-radius:10px;
}



.hero{
    padding:160px 20px 30px;
    text-align:center;
}

.hero h1{
    font-size:72px;
    background:linear-gradient(90deg,#0ea5e9,#22c55e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}


.slider{
    width:92%;
    max-width:1200px;
    height:520px;
    margin:40px auto;
    position:relative;
    overflow:hidden;
    border-radius:28px;

    box-shadow:0 30px 80px rgba(0,0,0,0.12);
}

.slides{
    display:flex;
    height:100%;
    transition:transform 0.6s ease;
}

.slide{
    min-width:100%;
}

.slide img{
    width:100%;
    height:100%;
    object-fit:cover;
}



.arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:52px;
    height:52px;
    border-radius:50%;
    border:none;
    cursor:pointer;

    background:linear-gradient(135deg,#ffffff,#e8fbff);
    font-size:22px;
    font-weight:600;

    box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.left{left:14px;}
.right{right:14px;}



.section-title{
    text-align:center;
    font-size:44px;
    margin:70px 0 25px;
    background:linear-gradient(90deg,#0ea5e9,#22c55e);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}


.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(420px,1fr));
    gap:30px;
    padding:0 44px 90px;
}

.card{
    background:linear-gradient(135deg,#ffffff,#f3fbff);
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.10);
}

.card img{
    width:100%;
    height:auto;
    display:block;
}



.empty-map{
    height:360px;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0.5;
}



.founder-card{
    display:flex;
    justify-content:center;
    padding:40px;
}

.founder-card img{
    width:180px;
    height:180px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 18px 45px rgba(0,0,0,0.18);
}

/* FOOTER */

footer{
    text-align:center;
    padding:30px;
    opacity:0.6;
}

</style>
</head>

<body>

<header>
<div class="logo">
<img src="https://bootycreek.github.io/IMG_3760.png">
<h2>Booty Creek Waterpark</h2>
</div>
</header>

<section class="hero">
<h1>Booty Creek</h1>
</section>


<div class="slider">
<div class="slides" id="mainSlides">
<div class="slide">
<img src="https://bootycreek.github.io/IMG_4172.jpeg">
</div>
</div>

<button class="arrow left" onclick="move('mainSlides',-1)">‹</button>
<button class="arrow right" onclick="move('mainSlides',1)">›</button>
</div>


<section class="section-title">Pools</section>

<div class="slider">
<div class="slides" id="poolSlides">
<div class="slide">
<img src="https://bootycreek.github.io/IMG_4173.jpeg">
</div>
</div>

<button class="arrow left" onclick="move('poolSlides',-1)">‹</button>
<button class="arrow right" onclick="move('poolSlides',1)">›</button>
</div>


<section class="section-title">Park Map</section>

<div class="grid">
<div class="card">
<div class="empty-map">Map coming soon…</div>
</div>
</div>


<section class="section-title">Founder</section>

<div class="grid">
<div class="card founder-card">
<img src="https://bootycreek.github.io/IMG_4171.jpeg">
</div>
</div>

<footer>© 2026 Booty Creek Waterpark</footer>

<script>

const indexes = {
    mainSlides:0,
    poolSlides:0
};

function move(id, dir){
    const slider = document.getElementById(id);
    const total = slider.children.length;

    indexes[id] += dir;

    if(indexes[id] < 0) indexes[id] = total - 1;
    if(indexes[id] >= total) indexes[id] = 0;

    slider.style.transform = `translateX(-${indexes[id] * 100}%)`;
}

</script>

</body>
</html>
